  <div class="content">
  <main>
    <h2>Quality Credit</h2>
    <h3>Add your quality credit, view previous quality credits, and see requirements</h3>
  <h2>Add Quality Credit</h2>

  <form class="credit-form">
    <label for="credit-name">Course or Activity Name</label>
    <input type="text" id="credit-name" placeholder="Example: Volunteering">

    <label for="credit-year">School Year</label>
    <select id="credit-year">
      <option>9th Grade</option>
      <option>10th Grade</option>
      <option>11th Grade</option>
      <option>12th Grade</option>
    </select>

    <label for="credit-description">Description</label>
    <textarea id="credit-description" placeholder="Describe how this counts as a quality credit."></textarea>

    <button type="submit">Add Credit</button>
  </form>
  <section class = qc-info>
    <a class = "text-link" href="https://docs.google.com/document/u/1/d/1sOPS98TFZOKB8r0051D8hBayjn-GA1VkRbATzbo05co/edit?usp=sharing">Please refer to this document for specifics on the Quality Credit Requirements →</a>
  </section>


  </main>
