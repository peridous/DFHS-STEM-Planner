<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STEM Planner — Michael Wang</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>STEM Planner</h1>
    <p class="subtitle">Michael Wang · Grade 10</p>
    <nav>
      <a href="index.html" class="active">Overview</a>
      <a href="choose-classes.html"> Choose Classes</a>
      <a href="classes.html">Past Courses</a>
      <a href="suggestions.html">Suggestions</a>
      <a href="requirements.html">Requirements</a>
    </nav>
  </header>

  <main>
    <section class="card">
      <h2>Student Overview</h2>
      <div class="overview-grid">
        <div class="overview-item">
          <span class="overview-label">Name</span>
          <span class="overview-value">Michael Wang</span>
        </div>
        <div class="overview-item">
          <span class="overview-label">Year of Graduation</span>
          <span class="overview-value">2028</span>
        </div>
        <div class="overview-item">
          <span class="overview-label">Counselor</span>
          <span class="overview-value">Mrs. Azhar</span>
        </div>
        <div class="overview-item">
          <span class="overview-label">Total Credits</span>
          <span class="overview-value">14</span>
        </div>
      </div>
    </section>

    <section class="card progress-card">
      <h2>Progress</h2>
      <div class="progress-track">
        <div class="progress-step completed">STEM</div>
        <div class="progress-step completed">STEM Scholar</div>
        <div class="progress-step">STEM Scholar with Honors</div>
      </div>
    </section>


  </main>
</body>
</html>
